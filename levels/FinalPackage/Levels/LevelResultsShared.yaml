objectDefinitions:
  levelResults: { mapObject: BlankStatic, mods: [ LevelResults ] }

  shopItemLabel:
    mapObject: Custom
    tags: [ "static" ]
    art3d:
      - model: "Art/3D/Foundation_FullTile_GreyWood.glb"
        pos: { x: -1.375, y: -0.27, z: -5.1 }
        rot: { x: -0.1 }
        scale: { x: 5.5, y: 1, z: 5.5 }
      - model: "Art/3D/Foundation_Two_Corners_GreyWood.glb"
        pos: { x: 1.375, y: -0.275, z: -5.55 }
        rot: { x: -0.1, y: -90 }
        scale: { x: 0.914, y: 1, z: 0.914 }
    art2d:
      - texture: "shopItemLabel.png"
        pos: { y: 0.08, z: -2.7 }
        rot: { x: -92, y: 90, z: -90 }
        scale: { x: 4.5, y: 4.75 }
        metallic: 0
        smoothness: 0
        transparent: false
      - texture: "shopItemLabelString.png"
        pos: { x: -0.25, y: 0.17, z: 0.1 }
        rot: { x: -88, y: 90, z: -90 }
        scale: { x: 2, y: 2 }
        metallic: 0
        smoothness: 0
        transparent: false
    textMeshes:
      - text: "<b>Item Name</b>"
        fontColour: "#002F46"
        fontSize: 5.5
        autoSize: true
        wrapText: false
        rectWidth: 1.8
        sortingOrder: -10
        pos: { x: 0.32, y: 0.12, z: -2.85 }
        rot: { x: 88, y: 0, z: -90 }
      - text: "<b>Item Info</b>"
        fontColour: "#3B5E2A"
        fontSize: 5.5
        autoSize: true
        wrapText: false
        rectWidth: 1.8
        sortingOrder: -10
        pos: { x: -0.46, y: 0.12, z: -2.85 }
        rot: { x: 88, y: 0, z: -90 }
  
  purchasedItemsSign:
    mapObject: Custom
    tags: [ "decal" ]
    dir: west
    art2d:
      - texture: "shopPurchasedItemsSign.png"
        displayType: decal
        projectionDistance: 0.2
        pos: { x: 0, y: 0.55, z: 0.9 }
        scale: { x: 6.4, y: 8.5 }
    textMeshes:
      - text: "<b>Purchased Items</b>"
        fontColour: "#002F46"
        fontSize: 7
        autoSize: true
        wrapText: false
        rectWidth: 2.8
        pos: { x: 0, y: 1.55, z: 0.98 }
  
  purchasedItemsSignNorth:
    mapObject: Custom
    tags: [ "decal" ]
    dir: north
    art2d:
      - texture: "shopPurchasedItemsSign.png"
        displayType: decal
        projectionDistance: 0.2
        pos: { x: 0.98, y: 0.65, z: -1 }
        scale: { x: 6.4, y: 8.5 }
    textMeshes:
      - text: "<b>Purchased Items</b>"
        fontColour: "#002F46"
        fontSize: 7
        autoSize: true
        wrapText: false
        rectWidth: 2.8
        pos: { x: 0.98, y: 1.65, z: -1 }
        rot: { x: 0, y: 90, z: 0 }

  # purchasedItemsSign:
  #   mapObject: Custom
  #   tags: [ "decal" ]
  #   dir: north
  #   art2d:
  #     - texture: "shopPurchasedItemsSign.png"
  #       displayType: decal
  #       projectionDistance: 0.2
  #       pos: { x: 0, y: 0.55, z: 0.9 }
