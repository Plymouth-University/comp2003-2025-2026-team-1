  shrinkTutorialSign:
    mapObject: Custom
    mods: [ ShopShrinkTutorial ]
    tags: [ "displayWithShrinkRay", "blocksMove" ]
    dir: north
    art2d:
      - texture: "floordeco29.png"
        metallic: 0
        smoothness: 0
        transparent: false
        pos: { x: 0.25, y: 1.7, z: 0.25 }
        rot: { y: 135 }
        scale: { x: 2.2, y: 2.8 }
  
  shrinkTutorialStep1Text:
    mapObject: Custom
    textMeshes:
      - text: "shop_shrinkTutorial_shrinkMe"
        fontColour: "#002F46"
        fontSize: 5
        autoSize: true
        rectWidth: 0.9
        rectHeight: 0.9
        pos: { x: 0.24, y: 1.7, z: 0.24 }
        rot: { y: 45 }
  shrinkTutorialStep2Text:
    mapObject: Custom
    textMeshes:
      - text: "shop_shrinkTutorial_carryMe"
        fontColour: "#002F46"
        fontSize: 5
        autoSize: true
        rectWidth: 0.9
        rectHeight: 0.9
        pos: { x: 0.24, y: 1.7, z: 0.24 }
        rot: { y: 45 }
  shrinkTutorialStep3Text:
    mapObject: Custom
    textMeshes:
      - text: "shop_shrinkTutorial_throw"
        fontColour: "#002F46"
        fontSize: 5
        autoSize: true
        rectWidth: 0.9
        rectHeight: 0.9
        pos: { x: 0.24, y: 1.7, z: 0.24 }
        rot: { y: 45 }
  shrinkTutorialStep4Text:
    mapObject: Custom
    textMeshes:
      - text: "shop_shrinkTutorial_haveFun"
        fontColour: "#002F46"
        fontSize: 5
        autoSize: true
        rectWidth: 0.9
        rectHeight: 0.9
        pos: { x: 0.24, y: 1.7, z: 0.24 }
        rot: { y: 45 }
  shrinkTutorialStep5Text:
    mapObject: Custom
    textMeshes:
      - text: "shop_shrinkTutorial_regrow"
        fontColour: "#002F46"
        fontSize: 5
        autoSize: true
        rectWidth: 0.9
        rectHeight: 0.9
        pos: { x: 0.24, y: 1.7, z: 0.24 }
        rot: { y: 45 }

  arrowdeco2: { mapObject: Custom, art2d: [ { texture: "resultsmovearrowdeco.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0, y: -0.9, z: 0}, rot: {x: 90, y: 0, z: 0}, scale: {x: 2, y: 6, z: 0} } ], tags: [ "decal" ] }
  nextleveldeco2: { mapObject: Custom, art2d: [ { texture: "nextleveldeco.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0, y: -0.98, z: 0}, rot: {x: 90, y: 180, z: 0}, scale: {x: 2.1, y: 2.1, z: 0} } ], tags: [ "decal", "NextLevel" ] }
  levelStatsDecal: { mapObject: Custom, art2d: [ { texture: "seestatsdeco.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0, y: -0.98, z: 0}, rot: {x: 90, y: 180, z: 0}, scale: {x: 2.1, y: 2.1, z: 0} } ], tags: [ "decal", "NextLevel" ] }
  replayleveldeco2: { mapObject: Custom, art2d: [ { texture: "replayleveldeco.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0, y: -0.9, z: 0}, rot: {x: 90, y: 180, z: 0}, scale: {x: 2.1, y: 2.1, z: 0} } ], tags: [ "decal", "ReplayLevel" ] }
  walldeco_shrinkme_s: { mapObject: Custom, dir: north, art2d: [ { texture: "floordeco29.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0.9, y: 0.3, z: 0}, scale: {x: 1.4, y: 1.4, z: 1} } ], tags: [ "decal", "displayWithShrinkRay" ] }
  barrier_l2: { mapObject: Custom, dir: south, art3d: [ { model: "Art/3D/GlassHalfWall_Straight_Border.glb", pos: {x: 0, y: 0, z: -0.4}, rot: {x: 0, y: 90, z: 0}, scale: {x: 1, y: 0.7, z: 1} } ], tags: [ "blocksMove", "static" ] }
 
  glassBarrierEdge_n: { mapObject: Custom, dir: north, art3d: [ { model: "Art/3D/GlassHalfWall_Straight_Border.glb", pos: { x: -0.9, y: -0.25 }, rot: { y: 180 } } ], tags: [ "furniture", "static" ] }
  glassBarrierEdge_s: { mapObject: Custom, dir: south, art3d: [ { model: "Art/3D/GlassHalfWall_Straight_Border.glb", pos: { x: -0.9, y: -0.25 }, rot: { y: 180 } } ], tags: [ "furniture", "static" ] }
  glassBarrierEdge_w: { mapObject: Custom, dir: west, art3d: [ { model: "Art/3D/GlassHalfWall_Straight_Border.glb", pos: { y: -0.25, z: -0.9 }, rot: { y: 180 } } ], tags: [ "furniture", "static"] }

  shrinkTestingTableFish:
    base: [ shrinkableFurniture ]
    dir: north
    art3d:
      - { model: "Art/3D/CoffeeTable_Sq_Cherry1.glb", rot: {x: 0, y: 180, z: 0} }
      - { model: "Art/3D/FishBowl.glb", pos: {x: 0, y: 0.5, z: 0} }
    tags: [ "blocksMove", "animated", "wobbleWhenBumped", "displayWithShrinkRay", "bounceIn", "tutorialShrinkable" ]

  # No scoreboard in results levels
  scoreboard: { mapObject: BlankStatic }

  # zone1: { mapObject: BlankStatic, tags: [ "Zone-1", "static" ] }
  # zone2: { mapObject: BlankStatic, tags: [ "Zone-2", "static" ] }
  # zone3: { mapObject: BlankStatic, tags: [ "Zone-3", "static" ] }
  # zone4: { mapObject: BlankStatic, tags: [ "Zone-4", "static" ] }

  itemLandingPosBlocker: { mapObject: BlankStatic, tags: [ "blocksMove" ] }

  shopItemDisplayTable:
    mapObject: custom
    dir: north
    art3d: [ { model: "Art/3D/CoffeeTable_Sq_Cherry1.glb", rot: { y: 180 } } ]
    tags: [ "furniture", "blocksMove", "static", "wobbleWhenBumped", "animated", "cameraTarget" ]

  # Shop Items
  #============

  # itemBase is a base object which all items 'inherit' from.
  # code for displaying coins above an item requires higher instruction limit
  itemBase: { mapObject: Custom, mods: [ { name: ShopItem, data: { instructionLimit: 10000 }, tags: [ "payable" ] } ], tags: [ "payable", "bounceIn" ] }

  item_bedUpgrade1:
    base: [ itemBase ]
    data: { id: bedUpgrade1 }
    art3d: [ { model: "Art/3D/Bed_Empty_2.glb", pos: {y: 0.5}, rot: {y: 200}, scale: {x: 0.7, y: 0.7, z: 0.7} } ]
  item_bedUpgrade2:
    base: [ itemBase ]
    data: { id: bedUpgrade2 }
    art3d: [ { model: "Art/3D/Bed_Empty_3.glb", pos: {y: 0.5}, rot: {y: 200}, scale: {x: 0.7, y: 0.7, z: 0.7} } ]
  
  item_petBedUpgrade1:
    base: [ itemBase ]
    data: { id: petBedUpgrade1 }
    art3d: [ { model: "Art/3D/PetBed_2.glb", pos: {y: 0.5}, rot: {y: 20}, scale: {x: 0.7, y: 0.7, z: 0.7} } ]
  item_petBedUpgrade2:
    base: [ itemBase ]
    data: { id: petBedUpgrade2 }
    art3d: [ { model: "Art/3D/PetBed_3.glb", pos: {y: 0.5}, rot: {y: 20}, scale: {x: 0.7, y: 0.7, z: 0.7} } ]

  item_shrinkRay:
    base: [ itemBase ]
    data: { id: shrinkRay }
    art3d: [ { model: "Art/3D/ShrinkRay.glb", pos: {y: 1, z: -0.4}, rot: {y: 110}, scale: {x: 0.7, y: 0.7, z: 0.7} } ]

  item_childBedUpgrade1:
    base: [ itemBase ]
    data: { id: childBedUpgrade1 }
