  # atmBase is a base object which different atm objects 'inherit' from.
  atmBase:
    mapObject: Custom
    dir: east
    mods: [ ATM ]
    art3d: [ { model: "Art/3D/ATM.glb" } ]
    tags: [ "blocksMove", "blocksThrow", "static", "wobbleWhenBumped", "animated", "cameraTarget" ]
  atmLowValue: { base: [ atmBase ], data: { id: atmLowValue } }
  atmMediumValue: { base: [ atmBase ], data: { id: atmMediumValue } }
  atmHighValue: { base: [ atmBase ], data: { id: atmHighValue } }

  ShopMoneyManager:
    mapObject: BlankStatic
    mods: [ ShopMoneyManager ]

  # A test script which sets things to initial values and/or runs 1 player through some test actions (get a coin, buy white flowers)
  ShopTest:
    mapObject: BlankStatic
    mods: [ ShopTest ]

  DIYManager:
    mapObject: BlankStatic
    mods:
    - name: DIYManager
      data: { instructionLimit: 10000 } # Needed to allow lots of customisations!
    tags: [ "static" ]

  DIYStall:
    mapObject: Custom
    art3d:
      - model: "DIYStall.glb"
    tags: [ "static", "interactable", "blocksMove", "blocksThrow" ]
    mods: [ "DIYStall" ]
    data:
      items: [ "PaintPot-blue", "PaintPot-purple", "PaintPot-white", "PaintPot-black" ] # Make these activated by purchase

  DIYLight:
    mapObject: Light
    tags: [ "static", "PointLight" ]
    data:
      PointLightRange: 2
      PointLightIntensity: 8
      PointLightPos: { y: 1.5 }

  DIYButtonBase:
    mapObject: BlankStatic
    mods:
    - "PushButton"
    tags: [ "static", "interactable", "blocksMove", "blocksThrow" ]

  DIYButtonR:
    base: [ DIYButtonBase ]
    data:
      messageToSend: "selectRight"
      targetPosRelative: { x: 0, y: 1 }

  DIYButtonL:
    base: [ DIYButtonBase ]
    data:
      messageToSend: "selectLeft"
      targetPosRelative: { x: 0, y: -1 }

  PaintPot-base:
