objectDefinitions:
  levelResults: { mapObject: BlankStatic, mods: [ LevelResults ] }
  
  arrowdeco2: { mapObject: Custom, art2d: [ { texture: "resultsmovearrowdeco.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0, y: -0.9, z: 0}, rot: {x: 90, y: 0, z: 0}, scale: {x: 2, y: 6, z: 0} } ], tags: [ "decal" ] }
  nextleveldeco2: { mapObject: Custom, art2d: [ { texture: "nextleveldeco.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0, y: -0.9, z: 0}, rot: {x: 90, y: 180, z: 0}, scale: {x: 2, y: 2, z: 0} } ], tags: [ "decal", "NextLevel" ] }
  replayleveldeco2: { mapObject: Custom, art2d: [ { texture: "replayleveldeco.png", displayType: decal, projectionDistance: 0.2, pos: {x: 0, y: -0.9, z: 0}, rot: {x: 90, y: 180, z: 0}, scale: {x: 2, y: 2, z: 0} } ], tags: [ "decal", "ReplayLevel" ] }
 
  barrier_l2: { mapObject: Custom, dir: south, art3d: [ { model: "Art/3D/GlassHalfWall_Straight_Border.glb", pos: {x: 0, y: 0, z: -0.4}, rot: {x: 0, y: 90, z: 0}, scale: {x: 1, y: 0.7, z: 1} } ], tags: [ "blocksMove", "static" ] }
 
  # No scoreboard in results levels
  scoreboard: { mapObject: BlankStatic }

  zone1: { mapObject: BlankStatic, tags: [ "Zone-1", "static" ] }
  zone2: { mapObject: BlankStatic, tags: [ "Zone-2", "static" ] }
  zone3: { mapObject: BlankStatic, tags: [ "Zone-3", "static" ] }
  zone4: { mapObject: BlankStatic, tags: [ "Zone-4", "static" ] }

  # itemBase is a base object which item1 and 2 'inherit' from.
  itemBase: { mapObject: Custom, mods: [ { name: ShopItem, tags: [ "payable" ] } ], tags: [ "payable" ] }
  item1: { base: [ itemBase ], data: { id: flowersWhite }, art3d: [ { model: "Art/3D/FloorPlant_5_D.glb", pos: {y: 0.5}, scale: {x: 1.3, y: 1.3, z: 1.3} } ] }
  item2: { base: [ itemBase ], data: { id: shrinkRay }, art3d: [ { model: "Art/3D/ShrinkRay.glb", pos: {y: 1, z: -0.4}, rot: {y: 180}, scale: {x: 0.7, y: 0.7, z: 0.7} } ] }
  item3: { base: [ itemBase ], data: { id: paintBlue }, art3d: [ { model: "PaintPot-blue.glb", pos: {y: 0.5}, rot: {y: 180}, scale: {x: 0.7, y: 0.7, z: 0.7} } ] }
  item4: { base: [ itemBase ], data: { id: paintPurple }, art3d: [ { model: "PaintPot-purple.glb", pos: {y: 0.5}, rot: {y: 180}, scale: {x: 0.7, y: 0.7, z: 0.7} } ] }
  item5: { base: [ itemBase ], data: { id: paintRed }, art3d: [ { model: "PaintPot-red.glb", pos: {y: 0.5}, rot: {y: 180}, scale: {x: 0.7, y: 0.7, z: 0.7} } ] }
  item6: { base: [ itemBase ], data: { id: paintGreen }, art3d: [ { model: "PaintPot-green.glb", pos: { y: 0.5 }, rot: { y: 180 }, scale: { x: 0.7, y: 0.7, z: 0.7 } } ] }
  item7: { base: [ itemBase ], data: { id: paintWhite }, art3d: [ { model: "PaintPot-white.glb", pos: { y: 0.5 }, rot: { y: 180 }, scale: { x: 0.7, y: 0.7, z: 0.7 } } ] }
  item8: { base: [ itemBase ], data: { id: paintBlack }, art3d: [ { model: "PaintPot-black.glb", pos: { y: 0.5 }, rot: { y: 180 }, scale: { x: 0.7, y: 0.7, z: 0.7 } } ] }

  # atmBase is a base object which atmA and B 'inherit' from.
  atmBase: { mapObject: Custom, mods: [ ATM ], dir: east, art3d: [ { model: "Art/3D/ATM.glb" } ], tags: [ "blocksMove", "static" ] }
  atmA: { base: [ atmBase ], data: { id: atmA } }
  atmB: { base: [ atmBase ], data: { id: atmB } }

  patient: { mapObject: Patient, mods: [ PatientHealth-DirectCallingBased ], data: { health: 5, need: syringe, instructionLimit: 2000 }, tags: [ "carryable", "throwable" ] }

  ShopMoneyManager:
    mapObject: BlankStatic
    mods: [ ShopMoneyManager ]

  # A test script which sets things to initial values and/or runs 1 player through some test actions (get a coin, buy white flowers)
  ShopTest:
    mapObject: BlankStatic
    mods: [ ShopTest ]

  DIYManager:
    mapObject: BlankStatic
    mods:
    - name: DIYManager
      data: { instructionLimit: 10000 } # Needed to allow lots of customisations!
    tags: [ "static" ]

  DIYStall:
    mapObject: Custom
    art3d:
      - model: "DIYStall.glb"
    tags: [ "static", "interactable", "blocksMove", "blocksThrow" ]
    mods: [ "DIYStall" ]
    data:
      items: [ "PaintPot-blue", "PaintPot-purple", "PaintPot-white", "PaintPot-black" ] # Make these activated by purchase

  DIYLight:
    mapObject: Light
    tags: [ "static", "PointLight" ]
    data:
      PointLightRange: 2
      PointLightIntensity: 8
      PointLightPos: { y: 1.5 }

  DIYButtonBase:
    mapObject: BlankStatic
    mods:
    - "PushButton"
    tags: [ "static", "interactable", "blocksMove", "blocksThrow" ]

  DIYButtonR:
    base: [ DIYButtonBase ]
    data:
      messageToSend: "selectRight"
      targetPosRelative: { x: 0, y: 1 }

  DIYButtonL:
    base: [ DIYButtonBase ]
    data:
      messageToSend: "selectLeft"
      targetPosRelative: { x: 0, y: -1 }

  PaintPot-base:
    mapObject: Custom
    tags: [ "carryable", "throwable", "destroyIfNotCaught", "destroyIfPutDown" ]
    mods: [ "PaintPot" ]

  PaintPot-blue:
    base: [ PaintPot-base ]
    data: { id: paintBlue }
    art3d:
      - model: "PaintPot-blue.glb"
        pos: { y: 0.25 }

  PaintPot-purple:
    base: [ PaintPot-base ]
    data: { id: paintPurple }
    art3d:
      - model: "PaintPot-purple.glb"
        pos: { y: 0.25 }

  PaintPot-red:
    base: [ PaintPot-base ]
    data: { id: paintRed }
    art3d:
      - model: "PaintPot-red.glb"
        pos: { y: 0.25 }

  PaintPot-green:
    base: [ PaintPot-base ]
    data: { id: paintGreen }
    art3d:
      - model: "PaintPot-green.glb"
        pos: { y: 0.25 }

  PaintPot-white:
    base: [ PaintPot-base ]
    data: { id: paintWhite }
    art3d:
      - model: "PaintPot-white.glb"
        pos: { y: 0.25 }

  PaintPot-black:
    base: [ PaintPot-base ]
    data: { id: paintBlack }
    art3d:
      - model: "PaintPot-black.glb"
        pos: { y: 0.25 }

globalData:
  shrinkRay:    { cost: 30, buyableName: "buyable_shrinkRay_dispenser" }
  flowersWhite: { cost: 5, buyableName: "buyable_flowers_white" }
  paintBlue:    { cost: 5, buyableName: "buyable_paintPot_blue", colour: "Blue" }
  paintPurple:  { cost: 5, buyableName: "buyable_paintPot_purple", colour: "Purple" }
  paintRed:     { cost: 5, buyableName: "buyable_paintPot_red", colour: "Red" }
  paintGreen:   { cost: 5, buyableName: "buyable_paintPot_green", colour: "Green" }
  paintWhite:   { cost: 5, buyableName: "buyable_paintPot_white", colour: "White" }
  paintBlack:   { cost: 5, buyableName: "buyable_paintPot_black", colour: "Black" }
  atmA:         { denomination: 5, item: coin5 }
  atmB:         { denomination: 10, item: coin10 }
  delayPerTurn: { delayPerTurn: 0 }

sounds:
